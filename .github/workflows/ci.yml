name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4"]

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Dogfood suite (bin/verity)
        run: bundle exec ./bin/verity

      - name: Minitest (test/)
        run: |
          set -euo pipefail
          shopt -s nullglob globstar
          for f in test/**/*_test.rb; do
            bundle exec ruby -Ilib:test "$f"
          done

      - name: RSpec (spec/)
        run: bundle exec rspec --format documentation

      - name: Parallel workers smoke test
        run: |
          bundle exec ruby -Ilib -e '
            require "verity"
            require "tmpdir"
            Dir.mktmpdir do |dir|
              db = File.join(dir, "ci.db")
              Dir.chdir(File.expand_path(".", ENV["GITHUB_WORKSPACE"] || ".")) do
                Verity.reset_configuration!
                Verity.configure do |c|
                  c.manifest_path = db
                  c.worker_count = 2
                  c.reporter = Verity::Reporters::NullReporter.new
                end
                exit(Verity.run ? 0 : 1)
              end
            end
          '

      - name: Lint (RuboCop)
        run: bundle exec rubocop --parallel
        continue-on-error: true
